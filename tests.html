    let currentQuestions = [];
    let userAnswers = [];
    let step = 0;
    let score = 0;

    function shuffle(arr) { return arr.sort(() => Math.random() - 0.5); }

    function initQuiz(themeId) {
        // Берем 10 вопросов темы, перемешиваем их
        const raw = allQuizzes[themeId];
        currentQuestions = shuffle([...raw]).map(item => {
            const correctText = item.a[item.c];
            const shuffledA = shuffle([...item.a]);
            return { q: item.q, a: shuffledA, cText: correctText };
        });

        step = 0; score = 0; userAnswers = [];
        document.getElementById('selection-screen').style.display = 'none';
        document.getElementById('quiz-content').style.display = 'block';
        renderQuestion();
    }

    function renderQuestion() {
        const data = currentQuestions[step];
        document.getElementById('question-title').innerText = data.q;
        document.getElementById('current-number').innerText = step + 1;
        const grid = document.getElementById('options-grid');
        grid.innerHTML = '';
        
        data.a.forEach((ans) => {
            const btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = ans;
            btn.onclick = () => {
                userAnswers.push(ans);
                if(ans === data.cText) score++;
                
                const btns = document.querySelectorAll('.option-btn');
                btns.forEach(b => {
                    b.style.pointerEvents = 'none';
                    if(b.innerText === data.cText) b.classList.add('correct');
                    else if(b.innerText === ans) b.classList.add('wrong');
                });

                setTimeout(() => {
                    step++;
                    if (step < 10) renderQuestion();
                    else showResults();
                }, 1000);
            };
            grid.appendChild(btn);
        });
    }

    function showResults() {
        document.getElementById('quiz-content').style.display = 'none';
        document.getElementById('result-screen').style.display = 'block';
        const p = Math.round((score / 10) * 100);
        document.getElementById('stat-percent').innerText = p + '%';
        document.getElementById('stat-count').innerText = score;

        const analysis = document.getElementById('detailed-analysis');
        analysis.innerHTML = '<h3>Разбор ответов:</h3>';
        currentQuestions.forEach((item, i) => {
            const div = document.createElement('div');
            div.className = 'analysis-item';
            let grid = `<div class="analysis-grid">`;
            item.a.forEach(ans => {
                let cls = "ans-pill";
                if (ans === item.cText) cls += " is-correct";
                if (ans === userAnswers[i] && ans !== item.cText) cls += " is-wrong";
                if (ans === userAnswers[i]) cls += " selected";
                grid += `<div class="${cls}">${ans}</div>`;
            });
            div.innerHTML = `<p><strong>${i+1}. ${item.q}</strong></p>${grid}</div>`;
            analysis.appendChild(div);
        });
    }
</script>
